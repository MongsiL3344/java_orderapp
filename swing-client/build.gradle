plugins {
    id 'java'
    id 'application'
}

group = 'io.github.mongsil3344'
version = '0.0.1-SNAPSHOT'
description = 'swing-client'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.21.2'
}

application {
    mainClass = 'io.github.mongsil3344.orderapp.client.OrderAppClientApplication'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
